name: SkilLock

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skil-lock:
    name: Verify skill capability deltas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: skills-lock/skil-lock-action@6c2fd7ca7cdd64ec7c6a25e84abd5306b2b6d501 # v0.2.1
        with:
          pin-binary: v0.2.1
