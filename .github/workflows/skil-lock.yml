name: SkilLock

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  skil-lock:
    name: Verify skill capability deltas
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: skills-lock/skil-lock-action@c7a3b9f649f80bf4b79a39cf5911cc18d58e0a89 # v0.2.0
        with:
          pin-binary: v0.2.0
